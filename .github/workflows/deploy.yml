name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: []  # Runs after CI passes (branch protection enforces this)
    if: github.ref == 'refs/heads/master'
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 78.47.104.139
          username: aielevate
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/ai-elevate/course-creator
            git pull origin master
            
            # Rebuild only changed services
            docker compose build --parallel
            docker compose up -d
            
            # Wait for health checks
            sleep 30
            
            # Verify all containers are healthy
            UNHEALTHY=$(docker compose ps --format json | python3 -c "
            import sys, json
            unhealthy = []
            for line in sys.stdin:
                c = json.loads(line)
                if 'healthy' not in c.get('Status', '') and 'running' in c.get('State', ''):
                    unhealthy.append(c['Name'])
            if unhealthy:
                print('UNHEALTHY: ' + ', '.join(unhealthy))
                sys.exit(1)
            print('All containers healthy')
            ")
            
            echo "$UNHEALTHY"

      - name: Notify on success
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: 78.47.104.139
          username: aielevate
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            python3 /home/aielevate/notify.py --priority MEDIUM \
              --subject "Course Creator deployed successfully" \
              --body "Auto-deploy from GitHub completed. All containers healthy. Commit: ${{ github.sha }}" \
              --org techuni 2>/dev/null

      - name: Notify on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: 78.47.104.139
          username: aielevate
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            python3 /home/aielevate/notify.py --priority HIGH \
              --subject "Course Creator deploy FAILED" \
              --body "Auto-deploy from GitHub failed. Commit: ${{ github.sha }}. Check GitHub Actions for details." \
              --org techuni 2>/dev/null
