name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment:
      name: production
      url: https://courses.techuni.ai

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 78.47.104.139
          username: aielevate
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/ai-elevate/course-creator
            git fetch origin
            git checkout master
            git pull origin master
            docker compose build --parallel
            docker compose up -d
            sleep 30
            RESULT=$(docker compose ps --format json | python3 -c "
            import sys, json
            unhealthy = []
            for line in sys.stdin:
                line = line.strip()
                if not line: continue
                c = json.loads(line)
                if 'healthy' not in c.get('Status', '') and 'running' in c.get('State', ''):
                    unhealthy.append(c['Name'])
            if unhealthy:
                print('UNHEALTHY: ' + ', '.join(unhealthy))
                sys.exit(1)
            print('All containers healthy')
            ")
            echo "$RESULT"

      - name: Notify on success
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: 78.47.104.139
          username: aielevate
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            python3 /home/aielevate/notify.py --priority MEDIUM \
              --subject "Course Creator PRODUCTION deployed" \
              --body "Deploy from master completed. All containers healthy. Commit: ${{ github.sha }}" \
              --org techuni 2>/dev/null

      - name: Notify on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: 78.47.104.139
          username: aielevate
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            python3 /home/aielevate/notify.py --priority HIGH \
              --subject "Course Creator PRODUCTION deploy FAILED" \
              --body "Deploy from master failed. Commit: ${{ github.sha }}. Check GitHub Actions." \
              --org techuni 2>/dev/null
