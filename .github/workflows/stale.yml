name: Close Stale PRs

on:
  schedule:
    - cron: '0 6 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-pr-message: 'This PR has been inactive for 14 days. It will be closed in 7 days if no further activity occurs.'
          close-pr-message: 'Closed due to inactivity. Feel free to reopen if still needed.'
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,security,do-not-close'
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-message: 'This issue has been inactive for 30 days.'
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,do-not-close'
