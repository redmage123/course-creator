name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: 'New Features'
    labels: ['feature', 'enhancement']
  - title: 'Bug Fixes'
    labels: ['bug', 'fix']
  - title: 'Security'
    labels: ['security']
  - title: 'Infrastructure'
    labels: ['infrastructure', 'ci']
  - title: 'Frontend'
    labels: ['frontend']
  - title: 'Dependencies'
    labels: ['dependencies']
  - title: 'Documentation'
    labels: ['documentation']
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels: ['major']
  minor:
    labels: ['feature', 'enhancement']
  patch:
    labels: ['bug', 'fix', 'dependencies']
  default: patch
template: |
  ## Changes

  $CHANGES

  **Full Changelog**: https://github.com/redmage123/course-creator/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
