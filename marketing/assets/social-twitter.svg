<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bgTW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1"/>
      <stop offset="55%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#311b92"/>
    </linearGradient>
    <linearGradient id="accentTW" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196f3"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
    <clipPath id="twClip">
      <rect width="1200" height="675"/>
    </clipPath>
  </defs>

  <g clip-path="url(#twClip)">
    <!-- Background -->
    <rect width="1200" height="675" fill="url(#bgTW)"/>

    <!-- Diagonal accent stripe -->
    <polygon points="0,0 400,0 0,250" fill="rgba(33,150,243,0.1)"/>
    <polygon points="1200,675 800,675 1200,425" fill="rgba(124,77,255,0.1)"/>

    <!-- Grid overlay -->
    <pattern id="gridTW" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="675" fill="url(#gridTW)"/>

    <!-- Left accent bar -->
    <rect x="0" y="0" width="6" height="675" fill="url(#accentTW)"/>

    <!-- Logo top-left -->
    <rect x="50" y="45" width="38" height="38" rx="9" fill="url(#accentTW)"/>
    <text x="69" y="71" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="white" text-anchor="middle">T</text>
    <text x="100" y="68" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="white">TechUni AI</text>

    <!-- ── STAT TEMPLATE AREA — 43h → 45s example style ── -->

    <!-- "from" label -->
    <text x="350" y="280" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="4">FROM</text>

    <!-- Big stat left (old) -->
    <text x="350" y="380" font-family="Inter, Arial, sans-serif" font-size="100" font-weight="900" fill="rgba(255,255,255,0.25)" text-anchor="middle">43h</text>

    <!-- Arrow -->
    <text x="600" y="380" font-family="Inter, Arial, sans-serif" font-size="80" font-weight="300" fill="url(#accentTW)" text-anchor="middle">→</text>

    <!-- Big stat right (new) -->
    <text x="850" y="380" font-family="Inter, Arial, sans-serif" font-size="100" font-weight="900" fill="url(#accentTW)" text-anchor="middle">45s</text>

    <!-- "to" label -->
    <text x="850" y="280" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="4">TO</text>

    <!-- Divider line -->
    <rect x="60" y="420" width="1080" height="2" rx="1" fill="rgba(255,255,255,0.1)"/>

    <!-- Headline text below -->
    <text x="600" y="475" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="white" text-anchor="middle">AI builds your training course in seconds.</text>
    <text x="600" y="510" font-family="Inter, Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.55)" text-anchor="middle">Replace hours of content creation with a single prompt.</text>

    <!-- CTA row -->
    <rect x="430" y="545" width="340" height="50" rx="10" fill="url(#accentTW)" opacity="0.9"/>
    <text x="600" y="576" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">Try TechUni Course Creator →</text>

    <!-- Bottom bar -->
    <rect x="0" y="645" width="1200" height="30" fill="rgba(0,0,0,0.35)"/>
    <text x="30" y="665" font-family="Inter, Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">cc.techuni.ai</text>
    <text x="1170" y="665" font-family="Inter, Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="end">#AILearning</text>
  </g>
</svg>
