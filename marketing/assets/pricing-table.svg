<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="bgPR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="proBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <linearGradient id="accentPR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196f3"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
    <filter id="proGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="proShadow">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#2196f3" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="url(#bgPR)"/>

  <!-- Title -->
  <text x="450" y="52" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="white" text-anchor="middle">Simple, Transparent Pricing</text>
  <text x="450" y="76" font-family="Inter, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.45)" text-anchor="middle">Per seat · Monthly or annual · Cancel anytime</text>

  <!-- ── FREE TIER ── -->
  <rect x="32" y="100" width="240" height="380" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Tier label -->
  <text x="152" y="148" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">FREE</text>

  <!-- Price -->
  <text x="152" y="195" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">$0</text>
  <text x="152" y="220" font-family="Inter, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.35)" text-anchor="middle">per seat / month</text>

  <!-- Divider -->
  <line x1="52" y1="238" x2="252" y2="238" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Features -->
  <text x="62" y="265" font-family="Inter, Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.65)">✓  3 courses / month</text>
  <text x="62" y="290" font-family="Inter, Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.65)">✓  Basic AI generation</text>
  <text x="62" y="315" font-family="Inter, Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.65)">✓  Up to 10 learners</text>
  <text x="62" y="340" font-family="Inter, Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)">✗  Docker labs</text>
  <text x="62" y="365" font-family="Inter, Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)">✗  Custom branding</text>
  <text x="62" y="390" font-family="Inter, Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)">✗  Analytics</text>

  <!-- CTA -->
  <rect x="52" y="432" width="200" height="36" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="152" y="455" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">Get Started Free</text>

