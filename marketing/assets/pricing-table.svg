  <text x="340" y="280" font-family="Inter, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">✓  Unlimited courses</text>
  <text x="340" y="306" font-family="Inter, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">✓  Advanced AI generation</text>
  <text x="340" y="332" font-family="Inter, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">✓  Docker lab environments</text>
  <text x="340" y="358" font-family="Inter, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">✓  Up to 500 learners</text>
  <text x="340" y="384" font-family="Inter, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">✓  Custom branding</text>
  <text x="340" y="410" font-family="Inter, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">✓  Full analytics + reporting</text>

