  <!-- Price -->
  <text x="450" y="192" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle">$14</text>
  <text x="450" y="218" font-family="Inter, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">per seat / month</text>
  <text x="450" y="236" font-family="Inter, Arial, sans-serif" font-size="11" fill="rgba(16,185,129,0.9)" text-anchor="middle">Save 22% vs Starter</text>

