  <text x="658" y="265" font-family="Inter, Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.65)">✓  Everything in Growth</text>
  <text x="658" y="290" font-family="Inter, Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.65)">✓  Unlimited learners</text>
  <text x="658" y="315" font-family="Inter, Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.65)">✓  SSO / SAML</text>
  <text x="658" y="340" font-family="Inter, Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.65)">✓  Dedicated support</text>
  <text x="658" y="365" font-family="Inter, Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.65)">✓  SLA guarantee</text>
  <text x="658" y="390" font-family="Inter, Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.65)">✓  Custom integrations</text>

  <!-- CTA -->
  <rect x="648" y="432" width="200" height="36" rx="8" fill="rgba(124,77,255,0.2)" stroke="rgba(124,77,255,0.5)" stroke-width="1"/>
  <text x="748" y="455" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">Contact Sales</text>

  <!-- Starter callout (small note) -->
  <text x="450" y="510" font-family="Inter, Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="middle">Starter plan available at $18/seat/mo · Billed annually</text>
</svg>
