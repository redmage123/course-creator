  <text x="450" y="465" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">Start 14-Day Free Trial →</text>

  <!-- ── ENTERPRISE TIER ── -->
  <rect x="628" y="100" width="240" height="380" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(124,77,255,0.3)" stroke-width="1"/>

