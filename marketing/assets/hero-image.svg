  <text x="667" y="218" font-family="Inter, Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">My Courses</text>
  <text x="667" y="248" font-family="Inter, Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Create New</text>
  <text x="667" y="278" font-family="Inter, Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Team</text>
  <text x="667" y="308" font-family="Inter, Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Analytics</text>
  <text x="667" y="338" font-family="Inter, Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Settings</text>

