  <rect x="1040" y="143" width="72" height="26" rx="6" fill="url(#accentGrad)"/>
  <text x="1076" y="160" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">+ New Course</text>

