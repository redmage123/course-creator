  <rect x="60" y="470" width="200" height="52" rx="10" fill="url(#accentGrad)" filter="url(#glow)"/>
  <text x="160" y="501" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">Start Free Trial →</text>

  <!-- Stat pill -->
  <rect x="280" y="470" width="240" height="52" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="400" y="491" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.6)" text-anchor="middle">FROM</text>
  <text x="400" y="512" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">43 hours → 45 seconds</text>

  <!-- Right side — Dashboard mockup -->
  <!-- Dashboard frame -->
  <rect x="580" y="70" width="560" height="478" rx="16" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.15)" stroke-width="1" filter="url(#shadow)"/>

  <!-- Dashboard title bar -->
  <rect x="580" y="70" width="560" height="44" rx="16" fill="rgba(255,255,255,0.1)"/>
  <rect x="580" y="95" width="560" height="20" fill="rgba(255,255,255,0.1)"/>
  <circle cx="604" cy="92" r="6" fill="#ff5f57"/>
  <circle cx="622" cy="92" r="6" fill="#febc2e"/>
  <circle cx="640" cy="92" r="6" fill="#28c840"/>
