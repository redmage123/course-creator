<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1565c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#311b92;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c4dff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06d6a0;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <clipPath id="dashClip">
      <rect x="580" y="80" width="560" height="468" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="url(#bgGrad)"/>

  <!-- Background grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="628" fill="url(#grid)"/>

  <!-- Decorative blobs -->
  <circle cx="100" cy="100" r="200" fill="rgba(33,150,243,0.15)"/>
  <circle cx="1100" cy="500" r="250" fill="rgba(124,77,255,0.15)"/>
  <circle cx="600" cy="600" r="180" fill="rgba(16,185,129,0.08)"/>

  <!-- Left side — copy -->
  <!-- Logo / brand -->
  <rect x="60" y="60" width="36" height="36" rx="8" fill="url(#accentGrad)"/>
  <text x="78" y="84" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">T</text>
  <text x="104" y="84" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="white">TechUni AI</text>

  <!-- Badge -->
  <rect x="60" y="130" width="160" height="28" rx="14" fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="1"/>
  <circle cx="78" cy="144" r="5" fill="#10b981"/>
  <text x="90" y="149" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#10b981">AI-Powered Platform</text>

  <!-- Headline -->
  <text x="60" y="220" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800" fill="white">Custom Courses.</text>
  <text x="60" y="280" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800" fill="white">Built in</text>
  <text x="60" y="340" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800">
    <tspan fill="url(#accentGrad)">45 Seconds.</tspan>
  </text>

  <!-- Subheadline -->
  <text x="60" y="385" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.75)">AI generates training courses tailored to</text>
  <text x="60" y="410" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.75)">your organization — your team stays focused</text>
  <text x="60" y="435" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.75)">on teaching, not content creation.</text>

