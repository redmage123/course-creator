  <text x="796" y="203" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="white">Generating: "AI Safety for Healthcare Teams"</text>
  <!-- Progress bar -->
  <rect x="796" y="212" width="300" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="796" y="212" width="210" height="6" rx="3" fill="url(#greenGrad)"/>
  <text x="796" y="236" font-family="Inter, Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.6)">70% complete · Est. 13 seconds remaining</text>

  <!-- Course cards row -->
  <!-- Card 1 -->
  <rect x="748" y="265" width="112" height="130" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="748" y="265" width="112" height="50" rx="8" fill="rgba(124,77,255,0.4)"/>
  <rect x="748" y="295" width="112" height="20" fill="rgba(124,77,255,0.4)"/>
  <text x="804" y="287" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">🛡️</text>
  <text x="756" y="330" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="600" fill="white">Cybersecurity</text>
  <text x="756" y="344" font-family="Inter, Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">Basics</text>
  <rect x="756" y="355" width="48" height="4" rx="2" fill="#10b981"/>
  <text x="756" y="380" font-family="Inter, Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">12 modules · Active</text>

  <!-- Card 2 -->
  <rect x="872" y="265" width="112" height="130" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="872" y="265" width="112" height="50" rx="8" fill="rgba(16,185,129,0.4)"/>
  <rect x="872" y="295" width="112" height="20" fill="rgba(16,185,129,0.4)"/>
  <text x="928" y="287" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">📊</text>
  <text x="880" y="330" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="600" fill="white">Data Literacy</text>
  <text x="880" y="344" font-family="Inter, Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">for Teams</text>
  <rect x="880" y="355" width="62" height="4" rx="2" fill="#10b981"/>
  <text x="880" y="380" font-family="Inter, Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">8 modules · Active</text>

  <!-- Card 3 -->
  <rect x="996" y="265" width="112" height="130" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="996" y="265" width="112" height="50" rx="8" fill="rgba(249,115,22,0.4)"/>
  <rect x="996" y="295" width="112" height="20" fill="rgba(249,115,22,0.4)"/>
  <text x="1052" y="287" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">🚀</text>
  <text x="1004" y="330" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="600" fill="white">Leadership</text>
  <text x="1004" y="344" font-family="Inter, Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">Essentials</text>
  <rect x="1004" y="355" width="36" height="4" rx="2" fill="#f97316"/>
  <text x="1004" y="380" font-family="Inter, Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">5 modules · Draft</text>

  <!-- Stats row -->
  <rect x="748" y="408" width="108" height="56" rx="8" fill="rgba(255,255,255,0.06)"/>
  <text x="802" y="428" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="white" text-anchor="middle">47</text>
  <text x="802" y="448" font-family="Inter, Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Courses Created</text>

  <rect x="868" y="408" width="108" height="56" rx="8" fill="rgba(255,255,255,0.06)"/>
  <text x="922" y="428" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#10b981" text-anchor="middle">342</text>
  <text x="922" y="448" font-family="Inter, Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Active Learners</text>

  <rect x="988" y="408" width="108" height="56" rx="8" fill="rgba(255,255,255,0.06)"/>
  <text x="1042" y="428" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#2196f3" text-anchor="middle">98%</text>
  <text x="1042" y="448" font-family="Inter, Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Completion Rate</text>

  <!-- Bottom domain watermark -->
  <text x="600" y="595" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.35)">cc.techuni.ai</text>
</svg>
