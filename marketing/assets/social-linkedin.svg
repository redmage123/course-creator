<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" width="1200" height="627">
  <defs>
    <linearGradient id="bgLI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1"/>
      <stop offset="60%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#311b92"/>
    </linearGradient>
    <linearGradient id="accentLI" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196f3"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
    <linearGradient id="greenLI" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06d6a0"/>
    </linearGradient>
    <clipPath id="liClip">
      <rect width="1200" height="627"/>
    </clipPath>
  </defs>

  <g clip-path="url(#liClip)">
    <!-- Background -->
    <rect width="1200" height="627" fill="url(#bgLI)"/>

    <!-- Grid overlay -->
    <pattern id="gridLI" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="627" fill="url(#gridLI)"/>

    <!-- Decorative orbs -->
    <circle cx="0" cy="0" r="350" fill="rgba(33,150,243,0.12)"/>
    <circle cx="1200" cy="627" r="400" fill="rgba(124,77,255,0.12)"/>
    <circle cx="600" cy="313" r="300" fill="rgba(16,185,129,0.05)"/>

    <!-- Top accent bar -->
    <rect x="0" y="0" width="1200" height="6" fill="url(#accentLI)"/>

    <!-- Logo -->
    <rect x="60" y="50" width="40" height="40" rx="10" fill="url(#accentLI)"/>
    <text x="80" y="77" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="white" text-anchor="middle">T</text>
    <text x="112" y="77" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="rgba(255,255,255,0.9)">TechUni AI</text>
    <text x="112" y="97" font-family="Inter, Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">Course Creator</text>

    <!-- ── STAT TEMPLATE AREA ── -->
    <!-- Main stat number -->
    <text x="600" y="260" font-family="Inter, Arial, sans-serif" font-size="140" font-weight="900" fill="url(#accentLI)" text-anchor="middle" opacity="0.95">STAT</text>

    <!-- Stat label — replace with real value -->
    <text x="600" y="320" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="300" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="8">HEADLINE TEXT HERE</text>

    <!-- Separator -->
    <rect x="480" y="345" width="240" height="3" rx="2" fill="url(#accentLI)"/>

    <!-- Sub-message -->
    <text x="600" y="390" font-family="Inter, Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="middle">Supporting detail or call to action goes here</text>

    <!-- Arrow / CTA -->
    <rect x="490" y="430" width="220" height="46" rx="10" fill="url(#accentLI)" opacity="0.9"/>
    <text x="600" y="459" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">See How It Works →</text>

    <!-- Bottom bar -->
    <rect x="0" y="595" width="1200" height="32" fill="rgba(0,0,0,0.4)"/>
    <text x="60" y="616" font-family="Inter, Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">cc.techuni.ai</text>
    <text x="1140" y="616" font-family="Inter, Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="end">#AILearning  #TechUni</text>
  </g>
</svg>
