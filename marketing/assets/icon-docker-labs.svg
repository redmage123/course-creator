<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="termG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="64" cy="64" r="56" fill="url(#bgD)"/>

  <!-- Container stack (Docker containers) -->
  <!-- Container 3 (back) -->
  <rect x="32" y="74" width="64" height="18" rx="4" fill="rgba(33,150,243,0.3)" stroke="rgba(33,150,243,0.6)" stroke-width="1.5"/>
  <!-- Container 2 (middle) -->
  <rect x="32" y="55" width="64" height="18" rx="4" fill="rgba(33,150,243,0.5)" stroke="rgba(33,150,243,0.8)" stroke-width="1.5"/>
  <!-- Container 1 (front / active) -->
  <rect x="32" y="36" width="64" height="18" rx="4" fill="rgba(33,150,243,0.85)" stroke="#2196f3" stroke-width="2"/>

  <!-- Terminal / code lines inside top container -->
  <rect x="38" y="41" width="6" height="8" rx="1" fill="rgba(255,255,255,0.9)"/>
  <rect x="48" y="43" width="36" height="3" rx="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="48" y="48" width="22" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>

  <!-- Blinking cursor -->
  <rect x="71" y="43" width="4" height="8" rx="1" fill="url(#termG)"/>

  <!-- Flask icon below containers -->
  <path d="M55 96 L55 104 L48 116 Q47 118 49 118 L79 118 Q81 118 80 116 L73 104 L73 96 Z"
        fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="1.5"/>
  <!-- Flask neck -->
  <rect x="55" y="90" width="18" height="8" rx="2" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Liquid in flask -->
  <path d="M50 113 L64 105 L78 113 L79 118 L49 118 Z" fill="rgba(16,185,129,0.45)"/>
  <!-- Bubble -->
  <circle cx="60" cy="112" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="70" cy="109" r="2" fill="rgba(255,255,255,0.4)"/>

  <!-- Sparkle -->
  <path d="M100 28 L101 24 L102 28 L106 29 L102 30 L101 34 L100 30 L96 29 Z" fill="rgba(255,255,255,0.7)"/>
</svg>
