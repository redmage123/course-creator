<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">
  <defs>
    <linearGradient id="bgEM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1"/>
      <stop offset="60%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#311b92"/>
    </linearGradient>
    <linearGradient id="accentEM" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196f3"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
    <linearGradient id="greenEM" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06d6a0"/>
    </linearGradient>
    <clipPath id="emClip">
      <rect width="600" height="180" rx="8"/>
    </clipPath>
  </defs>

  <g clip-path="url(#emClip)">
    <!-- Background -->
    <rect width="600" height="180" fill="url(#bgEM)"/>

    <!-- Grid -->
    <pattern id="gridEM" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <rect width="600" height="180" fill="url(#gridEM)"/>

    <!-- Decorative orbs -->
    <circle cx="0" cy="0" r="200" fill="rgba(33,150,243,0.1)"/>
    <circle cx="600" cy="180" r="200" fill="rgba(124,77,255,0.1)"/>

    <!-- Bottom accent bar -->
    <rect x="0" y="174" width="600" height="6" fill="url(#accentEM)"/>

    <!-- Logo mark -->
    <rect x="32" y="60" width="48" height="48" rx="12" fill="url(#accentEM)"/>
    <text x="56" y="92" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="white" text-anchor="middle">T</text>

    <!-- Wordmark -->
    <text x="96" y="84" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="white">TechUni AI</text>

    <!-- Product name -->
    <rect x="96" y="93" width="130" height="20" rx="4" fill="rgba(33,150,243,0.25)"/>
    <text x="161" y="107" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#42a5f5" text-anchor="middle" letter-spacing="1">COURSE CREATOR</text>

    <!-- Divider -->
    <line x1="260" y1="50" x2="260" y2="130" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

    <!-- Tagline right side -->
    <text x="295" y="82" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="rgba(255,255,255,0.75)">Custom AI training courses</text>
    <text x="295" y="104" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="rgba(255,255,255,0.75)">for your organization</text>

    <!-- Live badge -->
    <circle cx="302" cy="128" r="5" fill="url(#greenEM)"/>
    <text x="312" y="132" font-family="Inter, Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">cc.techuni.ai — Available now</text>
  </g>
</svg>
