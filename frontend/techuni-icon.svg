<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0A090"/>
      <stop offset="100%" stop-color="#8B7D6B"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8D4E0"/>
      <stop offset="50%" stop-color="#A8B8C8"/>
      <stop offset="100%" stop-color="#8898A8"/>
    </linearGradient>
    <linearGradient id="pillar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9A8A7A"/>
      <stop offset="30%" stop-color="#B8A898"/>
      <stop offset="70%" stop-color="#B8A898"/>
      <stop offset="100%" stop-color="#9A8A7A"/>
    </linearGradient>
  </defs>

  <!-- BUILDING -->
  <!-- Pediment (triangular roof) -->
  <polygon points="20,32 108,32 64,6" fill="#A09080"/>
  <polygon points="24,32 104,32 64,10" fill="#B0A090"/>
  <!-- Pediment accent line -->
  <line x1="24" y1="32" x2="104" y2="32" stroke="#8B7D6B" stroke-width="2"/>

  <!-- Building wall -->
  <rect x="26" y="32" width="76" height="54" fill="#8B7D6B"/>

  <!-- Pillar capitals -->
  <rect x="28" y="32" width="10" height="3" rx="1" fill="#C0B0A0"/>
  <rect x="48" y="32" width="10" height="3" rx="1" fill="#C0B0A0"/>
  <rect x="70" y="32" width="10" height="3" rx="1" fill="#C0B0A0"/>
  <rect x="90" y="32" width="10" height="3" rx="1" fill="#C0B0A0"/>

  <!-- Pillar shafts -->
  <rect x="30" y="35" width="6" height="51" rx="1" fill="url(#pillar)"/>
  <rect x="50" y="35" width="6" height="51" rx="1" fill="url(#pillar)"/>
  <rect x="72" y="35" width="6" height="51" rx="1" fill="url(#pillar)"/>
  <rect x="92" y="35" width="6" height="51" rx="1" fill="url(#pillar)"/>

  <!-- Pillar bases -->
  <rect x="28" y="83" width="10" height="3" rx="1" fill="#C0B0A0"/>
  <rect x="48" y="83" width="10" height="3" rx="1" fill="#C0B0A0"/>
  <rect x="70" y="83" width="10" height="3" rx="1" fill="#C0B0A0"/>
  <rect x="90" y="83" width="10" height="3" rx="1" fill="#C0B0A0"/>

  <!-- Door (arched entrance) -->
  <rect x="55" y="58" width="18" height="28" rx="9" fill="#3A2C1E"/>
  <rect x="57" y="60" width="14" height="26" rx="7" fill="#4A3C2E"/>
  <!-- Door handle -->
  <circle cx="67" cy="74" r="1.5" fill="#8B7D6B"/>

  <!-- Steps -->
  <rect x="20" y="86" width="88" height="7" rx="1" fill="#A09080"/>
  <rect x="14" y="93" width="100" height="7" rx="1" fill="#9A8A7A"/>
  <rect x="8" y="100" width="112" height="7" rx="1" fill="#A09080"/>
  <rect x="2" y="107" width="124" height="13" rx="1" fill="#9A8A7A"/>

  <!-- ROBOT (retro-futuristic, on the steps walking toward entrance) -->
  <!-- Antenna -->
  <line x1="38" y1="76" x2="38" y2="68" stroke="#9AA8B8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="38" cy="66" r="2.5" fill="#2563eb"/>

  <!-- Head (round dome) -->
  <circle cx="38" cy="82" r="6" fill="url(#metal)"/>
  <!-- Glass dome highlight -->
  <ellipse cx="37" cy="79" rx="3.5" ry="2.5" fill="#D8E0E8" opacity="0.4"/>
  <!-- Eye visor -->
  <rect x="33" y="81" width="10" height="2.5" rx="1.2" fill="#2563eb"/>
  <!-- Eye glow dots -->
  <circle cx="36" cy="82.2" r="0.8" fill="#60A0FF"/>
  <circle cx="40" cy="82.2" r="0.8" fill="#60A0FF"/>

  <!-- Neck -->
  <rect x="36" y="88" width="4" height="2" rx="1" fill="#A8B8C8"/>

  <!-- Body (cylindrical torso) -->
  <rect x="31" y="90" width="14" height="10" rx="3" fill="url(#metal)"/>
  <!-- Apron detail -->
  <rect x="33" y="92" width="10" height="5" rx="1" fill="#C0CCD8" opacity="0.5"/>
  <line x1="33" y1="95" x2="43" y2="95" stroke="#98A8B8" stroke-width="0.8"/>

  <!-- Arms -->
  <line x1="31" y1="92" x2="26" y2="87" stroke="#A8B8C8" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="25" cy="86" r="1.5" fill="#B8C8D8"/>
  <line x1="45" y1="92" x2="50" y2="87" stroke="#A8B8C8" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="51" cy="86" r="1.5" fill="#B8C8D8"/>

  <!-- Skirt/base (wider bottom of body) -->
  <rect x="30" y="99" width="16" height="3" rx="2" fill="#98A8B8"/>

  <!-- Wheels -->
  <circle cx="34" cy="104" r="3" fill="#8898A8" stroke="#6878888" stroke-width="1"/>
  <circle cx="42" cy="104" r="3" fill="#8898A8" stroke="#687888" stroke-width="1"/>
  <!-- Wheel centers -->
  <circle cx="34" cy="104" r="1" fill="#A8B8C8"/>
  <circle cx="42" cy="104" r="1" fill="#A8B8C8"/>
</svg>
